# Codemagic CI/CD configuration for Sarhny (صارحني)
#
# Three workflows:
#   1. android-workflow  → builds AAB, signs, uploads to Google Play Internal
#   2. ios-workflow      → builds IPA, signs with App Store, uploads to TestFlight
#   3. test-workflow     → fast PR check: flutter analyze + flutter test
#
# Before first run, configure these in the Codemagic UI:
#   • Teams → Integrations → connect your GitHub account, pick this repo.
#   • Code signing identities → Android keystores → upload your .jks
#       Reference name: `sarhny_keystore`
#       Key alias / passwords filled in there.
#   • Code signing identities → iOS → add App Store Connect API key
#       (Issuer ID + Key ID + .p8 file → reference name `app_store_connect`).
#   • Environment variables → add a group `sarhny_release`:
#       GOOGLE_PLAY_SERVICE_ACCOUNT_KEY  (JSON, encrypted)
#       APP_STORE_CONNECT_ISSUER_ID
#       APP_STORE_CONNECT_KEY_IDENTIFIER
#       APP_STORE_CONNECT_PRIVATE_KEY    (encrypted, the .p8 file contents)
#       API_BASE_URL                     (https://sarhny.com)

definitions:
  instance_types:
    mac: &mac_instance
      instance_type: mac_mini_m2
      max_build_duration: 60
    linux: &linux_instance
      # Plan has no Linux instances available — Android builds run on the
      # M2 Mac instead. Codemagic auto-substitutes M1→M2 anyway (M1 was
      # retired); naming M2 explicitly silences the deprecation warning.
      instance_type: mac_mini_m2
      max_build_duration: 60

  scripts:
    - &flutter_pub_get
      name: Get Flutter packages
      script: |
        flutter --version
        flutter pub get
    - &flutter_analyze
      name: Static analysis
      script: flutter analyze lib/
    - &flutter_test
      name: Run unit tests
      script: |
        # Skip if no tests yet.
        if ls test/*.dart >/dev/null 2>&1; then
          flutter test --no-pub
        else
          echo "No tests to run."
        fi
    - &set_env_file
      name: Write .env from environment variables
      script: |
        # Production fallback: the app hardcodes https://sarhny.com when no
        # local dev URL is present. We still write a marker .env so the
        # asset exists; .env is gitignored, so the bundle would be missing
        # the file otherwise (causing dotenv.load to throw at startup).
        cat > .env <<EOF
        API_BASE_URL=https://sarhny.com
        APP_ENV=production
        EOF

workflows:
  # ─────────────────────────── Android ───────────────────────────
  android-workflow:
    name: Android · Release (Internal)
    <<: *linux_instance
    environment:
      flutter: stable
      java: 17
      groups:
        - sarhny_release
      android_signing:
        - sarhny_keystore
      vars:
        # Legacy Play Store listing. Android builds from this branch update
        # existing users on com.sarhny instead of publishing a separate app.
        PACKAGE_NAME: "com.sarhny"
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true
      tag_patterns:
        - pattern: 'v*'
          include: true
    scripts:
      - *flutter_pub_get
      - *set_env_file
      - *flutter_analyze
      - *flutter_test
      - name: Bump build number from build counter
        script: |
          # Codemagic provides $BUILD_NUMBER monotonically per workflow.
          # We append it to the version in pubspec so every upload is unique.
          BASE=$(grep -E '^version: ' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          sed -i.bak "s/^version: .*/version: ${BASE}+${BUILD_NUMBER}/" pubspec.yaml
          echo "Building version ${BASE}+${BUILD_NUMBER}"
      - name: Set up release signing
        script: |
          # The `android_signing: sarhny_keystore` declaration fetches the
          # keystore to $CM_KEYSTORE_PATH and exposes its credentials as env
          # vars, but Flutter's build.gradle reads them from android/key.
          # properties — without this file written, the release build silently
          # falls back to the debug keystore and Google Play rejects the AAB
          # ("APK has been signed in debug mode").
          cat > "$CM_BUILD_DIR/android/key.properties" <<EOF
          storeFile=$CM_KEYSTORE_PATH
          storePassword=$CM_KEYSTORE_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          keyPassword=$CM_KEY_PASSWORD
          EOF
          # Sanity check the file is wired up (without leaking the password).
          echo "key.properties written; alias=$CM_KEY_ALIAS storeFile=$CM_KEYSTORE_PATH"
      - name: Build Android App Bundle
        script: |
          flutter build appbundle --release \
            --build-name="$(grep -E '^version: ' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)" \
            --build-number="$BUILD_NUMBER"
    artifacts:
      - build/**/outputs/bundle/**/*.aab
      - build/**/outputs/apk/**/*.apk
      - build/**/outputs/**/mapping.txt
      - flutter_drive.log
    publishing:
      google_play:
        # Encrypted JSON service-account key (set via Codemagic UI).
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_KEY
        # Internal testing is available before the new listing graduates
        # from draft app state, and keeps the build away from public users.
        track: internal
        submit_as_draft: false
      email:
        recipients:
          - s.sarhny@gmail.com
        notify:
          success: true
          failure: true

  # ─────────────────────────── iOS ───────────────────────────
  ios-workflow:
    name: iOS · TestFlight
    <<: *mac_instance
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - sarhny_release
      vars:
        APP_STORE_APP_ID: "1296542666"
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true
      tag_patterns:
        - pattern: 'v*'
          include: true
    scripts:
      - *flutter_pub_get
      - *set_env_file
      - *flutter_analyze
      - *flutter_test
      - name: Bump build number from build counter
        script: |
          BASE=$(grep -E '^version: ' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          sed -i.bak "s/^version: .*/version: ${BASE}+${BUILD_NUMBER}/" pubspec.yaml
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Prepare iOS project
        script: |
          flutter build ios --release --config-only --no-codesign
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.sarhny.Sarhny" \
            --type IOS_APP_STORE \
            --issuer-id=@env:APP_STORE_CONNECT_ISSUER_ID \
            --key-id=@env:APP_STORE_CONNECT_KEY_IDENTIFIER \
            --private-key=@env:APP_STORE_CONNECT_PRIVATE_KEY \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --build-name="$(grep -E '^version: ' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        # Public production release. After App Store Review approves the
        # build it ships to ALL users automatically (AFTER_APPROVAL is the
        # default Apple behavior — no manual "Release" click needed).
        # Prerequisite: store listing metadata (description, screenshots,
        # what's new, age rating, privacy details) must already be filled
        # in App Store Connect, otherwise review rejects the submission.
        submit_to_app_store: true
        release_type: AFTER_APPROVAL
        # Apple-controlled gradual rollout: 1% day 1 → 2% → 5% → 10% →
        # 20% → 50% → 100% over 7 days. Catches a broken release before
        # it hits everyone. Cancel from App Store Connect if needed.
        # Immediate 100% rollout the moment Apple Review approves —
        # every user gets the update on their next App Store check.
        phased_release: false
      email:
        recipients:
          - s.sarhny@gmail.com
        notify:
          success: true
          failure: true

  # ─────────────────────────── PR / Test ───────────────────────────
  test-workflow:
    name: PR · Analyze + Test
    <<: *linux_instance
    environment:
      flutter: stable
      java: 17
    triggering:
      events:
        - pull_request
      cancel_previous_builds: true
    scripts:
      - *flutter_pub_get
      - *flutter_analyze
      - *flutter_test
