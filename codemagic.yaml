# Codemagic CI/CD configuration for Sarhny (صارحني)
#
# Three workflows:
#   1. android-workflow  → builds AAB, signs, uploads to Google Play Internal
#   2. ios-workflow      → builds IPA, signs with App Store, uploads to TestFlight
#   3. test-workflow     → fast PR check: flutter analyze + flutter test
#
# Before first run, configure these in the Codemagic UI:
#   • Teams → Integrations → connect your GitHub account, pick this repo.
#   • Code signing identities → Android keystores → upload your .jks
#       Reference name: `sarhny_keystore`
#       Key alias / passwords filled in there.
#   • Code signing identities → iOS → add App Store Connect API key
#       (Issuer ID + Key ID + .p8 file → reference name `app_store_connect`).
#   • Environment variables → add a group `sarhny_release`:
#       GOOGLE_PLAY_SERVICE_ACCOUNT_KEY  (JSON, encrypted)
#       APP_STORE_CONNECT_ISSUER_ID
#       APP_STORE_CONNECT_KEY_IDENTIFIER
#       APP_STORE_CONNECT_PRIVATE_KEY    (encrypted, the .p8 file contents)
#       API_BASE_URL                     (https://api.sarhny.app for example)

definitions:
  instance_types:
    mac: &mac_instance
      instance_type: mac_mini_m2
      max_build_duration: 60
    linux: &linux_instance
      instance_type: linux_x2
      max_build_duration: 60

  scripts:
    - &flutter_pub_get
      name: Get Flutter packages
      script: |
        flutter --version
        flutter pub get
    - &flutter_analyze
      name: Static analysis
      script: flutter analyze lib/
    - &flutter_test
      name: Run unit tests
      script: |
        # Skip if no tests yet.
        if ls test/*.dart >/dev/null 2>&1; then
          flutter test --no-pub
        else
          echo "No tests to run."
        fi
    - &set_env_file
      name: Write .env from environment variables
      script: |
        # Codemagic injects API_BASE_URL etc. We write them into the .env
        # file the app reads at runtime via flutter_dotenv.
        cat > .env <<EOF
        API_BASE_URL=$API_BASE_URL
        EOF

workflows:
  # ─────────────────────────── Android ───────────────────────────
  android-workflow:
    name: Android · Release (Internal Track)
    <<: *linux_instance
    environment:
      flutter: stable
      java: 17
      groups:
        - sarhny_release
      android_signing:
        - sarhny_keystore
      vars:
        PACKAGE_NAME: "com.sarhny.sarhny"
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true
      tag_patterns:
        - pattern: 'v*'
          include: true
    scripts:
      - *flutter_pub_get
      - *set_env_file
      - *flutter_analyze
      - *flutter_test
      - name: Bump build number from build counter
        script: |
          # Codemagic provides $BUILD_NUMBER monotonically per workflow.
          # We append it to the version in pubspec so every upload is unique.
          BASE=$(grep -E '^version: ' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          sed -i.bak "s/^version: .*/version: ${BASE}+${BUILD_NUMBER}/" pubspec.yaml
          echo "Building version ${BASE}+${BUILD_NUMBER}"
      - name: Build Android App Bundle
        script: |
          flutter build appbundle --release \
            --build-name="$(grep -E '^version: ' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)" \
            --build-number="$BUILD_NUMBER"
    artifacts:
      - build/**/outputs/bundle/**/*.aab
      - build/**/outputs/apk/**/*.apk
      - build/**/outputs/**/mapping.txt
      - flutter_drive.log
    publishing:
      google_play:
        # Encrypted JSON service-account key (set via Codemagic UI).
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_KEY
        track: internal
        submit_as_draft: false
      email:
        recipients:
          - s.sarhny@gmail.com
        notify:
          success: true
          failure: true

  # ─────────────────────────── iOS ───────────────────────────
  ios-workflow:
    name: iOS · TestFlight
    <<: *mac_instance
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - sarhny_release
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sarhny.sarhny
      vars:
        APP_STORE_APP_ID: "1296542666"
    integrations:
      app_store_connect: app_store_connect
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true
      tag_patterns:
        - pattern: 'v*'
          include: true
    scripts:
      - *flutter_pub_get
      - *set_env_file
      - *flutter_analyze
      - *flutter_test
      - name: Bump build number from build counter
        script: |
          BASE=$(grep -E '^version: ' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          sed -i.bak "s/^version: .*/version: ${BASE}+${BUILD_NUMBER}/" pubspec.yaml
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --build-name="$(grep -E '^version: ' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        # Codemagic uses the App Store Connect API key configured above.
        auth: integration
        submit_to_testflight: true
        # Set to true once your app is ready for App Store review:
        submit_to_app_store: false
      email:
        recipients:
          - s.sarhny@gmail.com
        notify:
          success: true
          failure: true

  # ─────────────────────────── PR / Test ───────────────────────────
  test-workflow:
    name: PR · Analyze + Test
    <<: *linux_instance
    environment:
      flutter: stable
      java: 17
    triggering:
      events:
        - pull_request
      cancel_previous_builds: true
    scripts:
      - *flutter_pub_get
      - *flutter_analyze
      - *flutter_test
